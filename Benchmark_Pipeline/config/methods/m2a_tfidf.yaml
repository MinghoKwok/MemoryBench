name: m2a_tfidf

# TF-IDF baseline (no dense embeddings)
# Use this to compare against the full M2A implementation with dense embeddings
use_dense_embeddings: false
use_image_retrieval: false

# Retrieval parameters
semantic_top_k: 8
raw_top_k: 6
neighbor_window: 1
max_iterations: 2
rrf_k: 60
min_round_words_for_memory: 3

# TF-IDF hybrid ranking weights
semantic_lexical_weight: 0.35
semantic_dense_weight: 0.65
raw_lexical_weight: 0.35
raw_dense_weight: 0.65
