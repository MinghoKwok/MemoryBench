name: m2a_full

# Dense embedding settings (following original M2A paper)
use_dense_embeddings: true
text_embedding_model: "all-MiniLM-L6-v2"  # 384-dim sentence embeddings

# Cross-modal image retrieval (CLIP) - essential for vision-centric benchmark
use_image_retrieval: true
image_embedding_model: "openai/clip-vit-base-patch32"  # 512-dim image embeddings
image_weight: 0.15  # Weight for image retrieval in RRF fusion
strict_capabilities: true

# Retrieval parameters (tuned for precision over recall)
# Reduced from original M2A to avoid over-retrieval noise
semantic_top_k: 3      # was 8, aligned with m2a_lite for precision
raw_top_k: 2           # was 6, aligned with m2a_lite for precision
neighbor_window: 1
max_iterations: 1      # was 2, disable iterative expansion to prevent query drift
rrf_k: 60
min_round_words_for_memory: 3

# Hybrid ranking weights (tuned to trust dense embeddings more)
semantic_lexical_weight: 0.25   # was 0.35
semantic_dense_weight: 0.75     # was 0.65
raw_lexical_weight: 0.4         # was 0.35
raw_dense_weight: 0.6           # was 0.65
