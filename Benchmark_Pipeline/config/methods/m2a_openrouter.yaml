name: m2a

# LLM → OpenRouter (Qwen2.5-VL-7B)
llm_model: qwen/qwen3-vl-8b-instruct
llm_api_key: ""
llm_api_key_env: OPENROUTER_API_KEY
llm_base_url: https://openrouter.ai/api/v1
llm_timeout: 90

# Text embedding (local sentence-transformers)
text_embedding_model: all-MiniLM-L6-v2

# Multimodal embedding: SigLIP2 via vLLM (no CLIP fallback)
multimodal_embedding_model: siglip2-base-patch16-384
multimodal_embedding_url: http://localhost:8050/v1
multimodal_embedding_api_key: dummy

# ReAct loop settings
max_memory_iterations: 15
context_window: 5
max_query_iterations: 5
