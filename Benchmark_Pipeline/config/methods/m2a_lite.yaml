name: m2a_lite

# Dense embedding settings (lighter config for faster inference)
use_dense_embeddings: true
text_embedding_model: "all-MiniLM-L6-v2"  # 384-dim sentence embeddings

# Disable image retrieval for lite version
use_image_retrieval: false

# Retrieval parameters (smaller than full version)
semantic_top_k: 3
raw_top_k: 2
neighbor_window: 1

# Hybrid ranking weights
semantic_lexical_weight: 0.25
semantic_dense_weight: 0.75
raw_lexical_weight: 0.4
raw_dense_weight: 0.6
